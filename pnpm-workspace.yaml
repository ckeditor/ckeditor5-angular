onlyBuiltDependencies:
  - "@parcel/watcher"
  - core-js
  - cypress
  - esbuild
  - nice-napi
  - protobufjs

overrides:
  'ajv@^8': '^8.18.0'
  'diff@^7': '^8.0.3'
  'diff@^8': '^8.0.3'
  'qs@<6.14.1': '^6.14.2'
  'rollup@^4': '^4.59.0'
  'tar@^6': '^7.5.4'
  'webpack@^5': '^5.104.1'

minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'

shellEmulator: true
shamefullyHoist: true
preferFrozenLockfile: true
