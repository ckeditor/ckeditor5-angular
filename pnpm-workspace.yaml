packages:
  - .
  - src/ckeditor

onlyBuiltDependencies:
  - "@parcel/watcher"
  - core-js
  - cypress
  - esbuild
  - nice-napi
  - protobufjs

overrides:
  'axios@^1': '^1.15.0'
  'diff@^7': '^8.0.3'
  'fast-xml-parser@^5': '^5.5.7'
  'picomatch@^4': '^4.0.4'
  'serialize-javascript@^6': '^7.0.5'
  'tar@^6': '^7.5.11'
  'vite@^6': '^6.4.2'

minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'
  - 'axios'
  - 'vite'

shellEmulator: true
shamefullyHoist: true
preferFrozenLockfile: true
